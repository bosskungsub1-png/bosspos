<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Display</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1a2e;color:white;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#bgImg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.2;z-index:0;display:none}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* HEADER */
.hdr{padding:14px 24px;background:rgba(0,0,0,.45);display:flex;align-items:center;gap:14px;flex-shrink:0}
#shopLogo{width:52px;height:52px;object-fit:contain;border-radius:8px;display:none}
#shopName{font-size:24px;font-weight:bold;color:#f1c40f}
#shopSub{font-size:12px;color:#aaa;margin-top:2px}

/* CART TABLE */
.items-wrap{overflow:auto;padding:14px 24px 4px}
.items-label{font-size:11px;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px}
#itemsTable{width:100%;border-collapse:collapse;display:table}
#itemsTable th{padding:9px 8px;font-size:12px;color:#aaa;border-bottom:1px solid rgba(255,255,255,.15);text-align:left;font-weight:normal}
#itemsTable th:last-child{text-align:right}
#itemsTable td{padding:7px 8px;font-size:15px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle;height:40px;max-height:40px}
#itemsTable td:last-child{text-align:right;font-weight:bold;color:#2ecc71}
.qty-badge{background:rgba(255,255,255,.15);border-radius:10px;padding:1px 8px;font-size:13px;color:#ddd}

/* TOTAL */
.total-wrap{padding:6px 24px 16px;flex-shrink:0}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-radius:14px;background:rgba(46,204,113,.2);border:1px solid rgba(46,204,113,.4)}
.total-bar .lbl{font-size:18px;color:#2ecc71}
.total-bar .amt{font-size:38px;font-weight:bold;color:#2ecc71}

/* IDLE */
#idleView{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px}
#idleLogo{max-width:160px;max-height:160px;object-fit:contain;border-radius:14px;margin-bottom:16px;display:none}
#idleName{font-size:36px;font-weight:bold;color:#f1c40f;margin-bottom:8px;text-align:center}
#idleSub{font-size:16px;color:#aaa;text-align:center}
.blink{animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

.cartView{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* ===== PAID SCREEN ===== */
#paidScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:50;flex-direction:column;align-items:center;justify-content:center;padding:30px}
#paidScreen.show{display:flex}

.paid-icon{font-size:80px;margin-bottom:10px;animation:popIn .4s ease-out}
.paid-title{font-size:38px;font-weight:bold;color:#2ecc71;margin-bottom:20px}
@keyframes popIn{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}

.paid-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:700px;width:100%}
.paid-card{background:rgba(255,255,255,.1);border-radius:16px;padding:18px 24px;min-width:160px;text-align:center;border:1px solid rgba(255,255,255,.2);flex:1}
.paid-card .card-lbl{font-size:13px;color:#aaa;margin-bottom:6px}
.paid-card .card-amt{font-size:28px;font-weight:bold}
.paid-card.green{background:rgba(46,204,113,.2);border-color:rgba(46,204,113,.4)}
.paid-card.green .card-amt{color:#2ecc71}
.paid-card.blue{background:rgba(52,152,219,.2);border-color:rgba(52,152,219,.4)}
.paid-card.blue .card-amt{color:#3498db}
.paid-card.purple{background:rgba(142,68,173,.2);border-color:rgba(142,68,173,.4)}
.paid-card.purple .card-amt{color:#9b59b6}
.paid-card.orange{background:rgba(230,126,34,.2);border-color:rgba(230,126,34,.4)}
.paid-card.orange .card-amt{color:#e67e22}
.paid-card.yellow{background:rgba(241,196,15,.2);border-color:rgba(241,196,15,.4)}
.paid-card.yellow .card-amt{color:#f1c40f}

/* STATUS */
#statusBar{position:fixed;bottom:6px;right:12px;font-size:11px;color:rgba(255,255,255,.25);z-index:100}
</style>
</head>
<body>
<img id="bgImg" src="">
<div class="wrap">
  <div class="hdr">
    <img id="shopLogo" src="">
    <div>
      <div id="shopName">ร้านค้า</div>
      <div id="shopSub"></div>
    </div>
  </div>

  <div id="idleView">
    <img id="idleLogo" src="">
    <div id="idleName">ยินดีต้อนรับ</div>
    <div id="idleSub" class="blink">กรุณารอสักครู่...</div>
  </div>

  <div class="cartView" id="cartView" style="display:none">
    <div class="items-wrap">
      <div class="items-label">รายการสินค้า</div>
      <table id="itemsTable">
        <thead><tr>
          <th>สินค้า</th>
          <th style="text-align:center;width:80px">จำนวน</th>
          <th style="text-align:right;width:90px">ราคา/ชิ้น</th>
          <th style="text-align:right;width:90px">รวม</th>
        </tr></thead>
        <tbody id="itemsBody" style="vertical-align:top"></tbody>
      </table>
    </div>
    <div class="total-wrap">
      <div class="total-bar">
        <span class="lbl">💰 ยอดรวม</span>
        <span class="amt" id="dispTotal">0 ฿</span>
      </div>
    </div>
  </div>
</div>

<!-- PAID OVERLAY -->
<div id="paidScreen">
  <div class="paid-icon" id="paidIcon">✅</div>
  <div class="paid-title" id="paidTitle">ชำระเงินแล้ว</div>
  <div class="paid-cards" id="paidCards"></div>
</div>

<div id="statusBar">⏳ กำลังเชื่อมต่อ...</div>

<script>
var settings   = {};
var lastTs     = 0;
var lastType   = '';
var lastCartTs = 0;
var lastPaidTs = 0;    // ts ของ paid ที่แสดงไปแล้ว — ไม่แสดงซ้ำ
var paidActive = false;
var paidTimer  = null;
var pollCount  = 0;

function fmt(n){ return Number(n||0).toLocaleString(); }

function loadSettings(){
  try{
    var s=localStorage.getItem('receipt_settings');
    if(s){ settings=JSON.parse(s); applySettings(); }
  }catch(e){}
}
function applySettings(){
  var sn=settings.shopName||'ร้านค้า';
  setText('shopName',sn); setText('idleName',sn);
  var sub=[settings.shopAddress,settings.shopTel].filter(Boolean).join(' | ');
  setText('shopSub',sub);
  if(settings.logoUrl){ setImg('shopLogo',settings.logoUrl); setImg('idleLogo',settings.logoUrl); }
  if(settings.bgUrl) setImg('bgImg',settings.bgUrl);
  if(settings.bgColor) document.body.style.background=settings.bgColor;
}
function setText(id,v){ var e=document.getElementById(id); if(e) e.textContent=v; }
function setImg(id,src){ var e=document.getElementById(id); if(!e) return; e.src=src; e.style.display='block'; }

loadSettings();

// ===== POLL =====
function poll(){
  google.script.run
    .withSuccessHandler(function(data){
      pollCount++;
      setText('statusBar','\u{1F7E2} เชื่อมต่อ | '+pollCount);
      if(!data || !data.type) return;
      handleData(data);
    })
    .withFailureHandler(function(){
      setText('statusBar','\u{1F534} เชื่อมต่อไม่ได้');
    })
    .getDisplayData();
}

// รับ localStorage ด้วย (เครื่องเดียวกัน)
window.addEventListener('storage', function(e){
  if(e.key==='pos_display' && e.newValue){
    try{ handleData(JSON.parse(e.newValue)); }catch(ex){}
  }
  if(e.key==='receipt_settings') loadSettings();
});

function handleData(data){
  if(!data || !data.type) return;
  var ts = data.ts || 0;

  if(data.type==='cart'){
    // skip cart เก่า
    if(ts > 0 && ts <= lastCartTs) return;
    lastCartTs = ts;
    // cart ใหม่ → ยกเลิก paid ทันที
    clearTimeout(paidTimer);
    paidActive = false;
    showCart(data);
    return;
  }

  if(data.type==='paid'){
    // *** KEY FIX: ถ้า paid ts นี้เคยแสดงแล้ว → skip ตลอดกาล ***
    if(ts > 0 && ts === lastPaidTs) return;
    if(paidActive) return;
    lastPaidTs = ts;   // จำ ts นี้ไว้ ไม่แสดงซ้ำ
    paidActive = true;
    showPaid(data);
    // ล้าง GAS ทันที (async ok)
    google.script.run.clearDisplayData();
    return;
  }

  if(data.type==='clear'){
    if(paidActive) return;
    showIdle();
  }
}

function showCart(data){
  document.getElementById('paidScreen').classList.remove('show');
  document.getElementById('idleView').style.display = 'none';
  document.getElementById('cartView').style.display = 'flex';
  var body='';
  (data.items||[]).forEach(function(i){
    body+='<tr><td>'+i.name+'</td>';
    body+='<td style="text-align:center"><span class="qty-badge">×'+i.qty+'</span></td>';
    body+='<td style="text-align:right;color:#aaa">'+fmt(i.price)+'</td>';
    body+='<td>'+fmt(i.total)+'</td></tr>';
  });
  if(!body){ showIdle(); return; }
  document.getElementById('itemsBody').innerHTML = body;
  document.getElementById('dispTotal').textContent = fmt(data.total)+' ฿';
}

function card(lbl,amt,cls){
  return '<div class="paid-card '+(cls||'')+'"><div class="card-lbl">'+lbl+'</div><div class="card-amt">'+amt+'</div></div>';
}

function showPaid(data){
  var screen=document.getElementById('paidScreen');
  screen.classList.add('show');
  var pt=data.payType||'Cash', bil=data.billTotal||0;
  var icon='\u2705', title='\u0e0a\u0e33\u0e23\u0e30\u0e40\u0e07\u0e34\u0e19\u0e41\u0e25\u0e49\u0e27', cards='';

  if(pt==='Cash'){
    var paid=Number(data.cash||0), change=Number(data.change||0);
    if(change===0){ icon='\ud83d\udc4f'; title='\u0e23\u0e31\u0e1a\u0e40\u0e07\u0e34\u0e19\u0e1e\u0e2d\u0e14\u0e35!'; }
    else { icon='\ud83d\udcb5'; title='\u0e23\u0e31\u0e1a\u0e40\u0e07\u0e34\u0e19\u0e2a\u0e14'; }
    cards+=card('\ud83d\udcb5 \u0e23\u0e31\u0e1a\u0e21\u0e32',fmt(paid)+' \u0e3f','green');
    cards+=change>0?card('\ud83d\udcb0 \u0e40\u0e07\u0e34\u0e19\u0e17\u0e2d\u0e19',fmt(change)+' \u0e3f','yellow'):card('\u2705 \u0e1e\u0e2d\u0e14\u0e35','\u0e44\u0e21\u0e48\u0e21\u0e35\u0e17\u0e2d\u0e19','green');
    cards+=card('\ud83e\udded \u0e22\u0e2d\u0e14\u0e23\u0e27\u0e21',fmt(bil)+' \u0e3f','blue');
  } else if(pt==='QR'){
    icon='\ud83d\udcf1'; title='\u0e23\u0e31\u0e1a\u0e40\u0e07\u0e34\u0e19\u0e42\u0e2d\u0e19 QR';
    cards+=card('\ud83d\udcf1 \u0e42\u0e2d\u0e19\u0e21\u0e32',fmt(bil)+' \u0e3f','blue');
    cards+=card('\ud83e\udded \u0e22\u0e2d\u0e14\u0e23\u0e27\u0e21',fmt(bil)+' \u0e3f','green');
  } else {
    icon='\ud83d\udd00'; title='\u0e23\u0e31\u0e1a\u0e40\u0e07\u0e34\u0e19\u0e1c\u0e2a\u0e21';
    if(data.channels&&data.channels.length){
      data.channels.filter(function(c){return c.amount>0;}).forEach(function(c){
        var cls='green', key=c.key||'';
        if(key.indexOf('transfer')>=0||key.indexOf('qr')>=0) cls='blue';
        else if(key.indexOf('welfare')>=0) cls='purple';
        cards+=card(c.label,fmt(c.amount)+' \u0e3f',cls);
      });
    } else {
      if(data.cash)     cards+=card('\ud83d\udcb5 \u0e40\u0e07\u0e34\u0e19\u0e2a\u0e14',fmt(data.cash)+' \u0e3f','green');
      if(data.transfer) cards+=card('\ud83d\udcf1 \u0e42\u0e2d\u0e19',fmt(data.transfer)+' \u0e3f','blue');
      if(data.welfare)  cards+=card('\ud83d\udcb3 \u0e1a\u0e31\u0e15\u0e23\u0e2a\u0e27\u0e31\u0e2a\u0e14\u0e34\u0e01\u0e32\u0e23',fmt(data.welfare)+' \u0e3f','purple');
    }
    cards+=card('\ud83e\udded \u0e22\u0e2d\u0e14\u0e23\u0e27\u0e21',fmt(bil)+' \u0e3f','yellow');
  }

  document.getElementById('paidIcon').textContent  = icon;
  document.getElementById('paidTitle').textContent = title;
  document.getElementById('paidCards').innerHTML   = cards;

  clearTimeout(paidTimer);
  paidTimer = setTimeout(function(){
    screen.classList.remove('show');
    paidActive = false;
    // ไม่ reset lastTs/lastType — ป้องกันไม่ให้ paid เดิม (ts เดิม) กลับมาอีก
    showIdle();
  }, 2000);
}

function showIdle(){
  document.getElementById('paidScreen').classList.remove('show');
  document.getElementById('idleView').style.display = 'flex';
  document.getElementById('cartView').style.display = 'none';
}

poll();
setInterval(poll, 1500);
</script>
</body>
</html>
