<!DOCTYPE html>
<html>
<body style="font-family:Arial;padding:15px;max-width:400px;margin:0 auto">

<h2>🔍 ค้นหาบิล</h2>

<div style="display:flex;gap:8px;margin-bottom:15px">
  <input id="bill" placeholder="เลขบิล" style="flex:1;padding:10px;font-size:16px;border:1px solid #ddd;border-radius:6px">
  <button onclick="loadBill()" style="padding:10px 18px;font-size:16px;background:#2c3e50;color:white;border:none;border-radius:6px;cursor:pointer">ค้นหา</button>
</div>

<div id="result"></div>

<style>
  .receipt { font-family:'Courier New',monospace; background:white; padding:15px; border:1px solid #ddd; border-radius:8px; font-size:13px; line-height:1.7; }
  .r-shop  { font-size:17px; font-weight:bold; text-align:center; }
  .r-meta  { text-align:center; font-size:11px; color:#666; margin-bottom:6px; }
  .r-line  { border:none; border-top:1px dashed #aaa; margin:6px 0; }
  .r-row   { display:flex; justify-content:space-between; }
  .r-total { display:flex; justify-content:space-between; font-weight:bold; font-size:15px; border-top:1px solid #333; padding-top:4px; margin-top:4px; }
  .r-small { font-size:12px; color:#555; }
  .btn-print { width:100%; margin-top:12px; padding:12px; font-size:16px; background:#2c3e50; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
  @media print { .no-print { display:none !important; } }
</style>

<script>
function loadBill() {
  let bill = document.getElementById("bill").value.trim();
  if (!bill) return;
  document.getElementById("result").innerHTML = "<p>⏳ กำลังโหลด...</p>";

  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.header) {
        document.getElementById("result").innerHTML = "<p style='color:red'>ไม่พบบิล #" + bill + "</p>";
        return;
      }
      let h = res.header;
      let itemsHtml = res.items.map(i =>
        `<div class="r-row"><span>${i.name} x${i.qty}</span><span>${i.total} ฿</span></div>`
      ).join('');

      let payHtml = '';
      if (h.type === 'Cash' && h.cash) {
        payHtml = `<div class="r-row r-small"><span>รับเงิน</span><span>${h.cash} ฿</span></div>
                   <div class="r-row r-small"><span>เงินทอน</span><span>${h.cash - h.total} ฿</span></div>`;
      } else if (h.type === 'Mix') {
        payHtml = `<div class="r-row r-small"><span>เงินสด</span><span>${h.cash} ฿</span></div>
                   <div class="r-row r-small"><span>โอน</span><span>${h.transfer} ฿</span></div>`;
      }

      document.getElementById("result").innerHTML = `
        <div class="receipt">
          <div class="r-shop">ร้านค้า</div>
          <div class="r-meta">บิล #${h.billNo} | ${h.date}</div>
          <hr class="r-line">
          ${itemsHtml}
          <hr class="r-line">
          <div class="r-total"><span>รวม</span><span>${h.total} ฿</span></div>
          <div class="r-row r-small"><span>ชำระ: ${h.type}</span></div>
          ${payHtml}
          <div style="text-align:center;margin-top:10px;font-size:11px">ขอบคุณที่ใช้บริการ</div>
        </div>
        <button class="btn-print no-print" onclick="window.print()">🖨 พิมพ์ใบเสร็จ</button>`;
    })
    .withFailureHandler(() => {
      document.getElementById("result").innerHTML = "<p style='color:red'>เกิดข้อผิดพลาด</p>";
    })
    .getBill(Number(bill));
}

document.getElementById("bill").onkeydown = e => { if (e.key === "Enter") loadBill(); };
</script>
</body>
</html>
